    --shadow:0 1px 2px rgba(23,24,26,.03), 0 10px 30px rgba(23,24,26,.045);
    --shadow-lift:0 2px 4px rgba(23,24,26,.05), 0 14px 36px rgba(23,24,26,.08);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  @media (prefers-reduced-motion:reduce){
    html{scroll-behavior:auto}
    *,*::before,*::after{animation:none!important;transition:none!important}
  }
  body{
    background:var(--paper);color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;font-size:15px;line-height:1.55;
    -webkit-font-smoothing:antialiased;
  }
  .num{font-variant-numeric:tabular-nums;letter-spacing:-0.01em}

  .topbar{
    display:flex;align-items:center;justify-content:space-between;gap:16px;
    max-width:1080px;margin:0 auto;padding:20px 24px;
  }
  .wordmark{font-weight:600;font-size:16px;letter-spacing:-0.02em}
  .wordmark span{color:var(--green)}
  .topnav{display:flex;gap:22px;margin-left:34px;margin-right:auto}
  .topnav a, .topnav button{
    font:inherit;font-size:13px;font-weight:500;color:var(--grey);
    text-decoration:none;background:none;border:none;padding:0;cursor:pointer;
    transition:color .12s;
  }
  .topnav a:hover, .topnav button:hover{color:var(--ink)}
  .topnav a:focus-visible, .topnav button:focus-visible{outline:2px solid var(--green);outline-offset:3px;border-radius:2px}
  @media (max-width:880px){.topnav{display:none}}
  #rechner, #optimieren{scroll-margin-top:16px}
  .topright{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
  .pill{
    font-size:12px;font-weight:500;color:var(--grey);
    border:1px solid var(--hairline);border-radius:99px;
    padding:5px 12px;background:var(--card);white-space:nowrap;
  }
  .pill b{color:var(--green);font-weight:600}
  button.pill-btn{cursor:pointer;font:inherit}
  button.pill-btn:hover{border-color:var(--grey-light)}
  .lang{display:inline-flex;border:1px solid var(--hairline);border-radius:99px;overflow:hidden;background:var(--card)}
  .lang button{
    border:none;background:transparent;font:inherit;font-size:12px;font-weight:600;
    color:var(--grey);padding:5px 12px;cursor:pointer;transition:background .12s,color .12s;
  }
  .lang button[aria-pressed="true"]{background:var(--ink);color:#fff}
  .lang button:focus-visible{outline:2px solid var(--green);outline-offset:-2px}

  .hero{max-width:1080px;margin:0 auto;padding:44px 24px 8px}
  .kicker{
    font-size:11.5px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;
    color:var(--grey-light);margin-bottom:14px;
  }
  .hero h1{
    font-family:'Source Serif 4',Georgia,serif;font-weight:600;
    font-size:clamp(30px,4.4vw,44px);letter-spacing:-0.015em;line-height:1.12;max-width:680px;
  }
  .hero p{color:var(--grey);max-width:580px;margin-top:14px;font-size:16px}

  .tool{
    max-width:1080px;margin:36px auto 0;padding:0 24px;
    display:grid;grid-template-columns:minmax(0,1fr) minmax(0,420px);gap:28px;align-items:start;
  }
  @media (max-width:880px){.tool{grid-template-columns:1fr}}

  .panel{background:var(--card);border:1px solid var(--hairline);border-radius:var(--radius);box-shadow:var(--shadow)}

  .form{padding:28px;counter-reset:q}
  .q{padding:20px 0;border-bottom:1px solid var(--hairline)}
  .form > .q > .q-label::before{
    counter-increment:q;
    content:counter(q,decimal-leading-zero);
    display:inline-block;margin-right:9px;
    font-size:10.5px;font-weight:600;letter-spacing:.08em;
    color:var(--grey-light);font-variant-numeric:tabular-nums;
    transform:translateY(-1px);
  }
  .q:first-child{padding-top:0}
  .q:last-child{border-bottom:none;padding-bottom:0}
  .q-label{font-weight:600;font-size:14px;margin-bottom:4px}
  .q-hint{font-size:13px;color:var(--grey);margin-bottom:12px}

  .money-row{display:flex;gap:10px;align-items:stretch}
  .money-input{
    flex:1;display:flex;align-items:center;
    border:1px solid var(--hairline-strong);border-radius:8px;background:var(--card);
    padding:0 14px;transition:border-color .15s, box-shadow .15s;
  }
  .money-input:focus-within{border-color:var(--ink);box-shadow:0 0 0 3px rgba(23,24,26,.06)}
  .money-input .cur{color:var(--grey-light);font-weight:500;margin-right:8px}
  .money-input input{
    border:none;outline:none;width:100%;padding:12px 0;
    font-size:18px;font-weight:600;font-variant-numeric:tabular-nums;
    background:transparent;color:var(--ink);font-family:inherit;
  }
  .seg{display:flex;border:1px solid var(--hairline-strong);border-radius:8px;overflow:hidden;background:var(--card)}
  .seg.small{display:inline-flex}
  .seg button{
    flex:1;border:none;background:transparent;padding:10px 14px;
    font:inherit;font-size:13.5px;font-weight:500;color:var(--grey);cursor:pointer;
    border-right:1px solid var(--hairline);transition:background .12s,color .12s;white-space:nowrap;
  }
  .seg button:last-child{border-right:none}
  .seg button[aria-pressed="true"]{background:var(--ink);color:#fff}
  .seg button:focus-visible{outline:2px solid var(--green);outline-offset:-2px}

  .sub-q{margin-top:14px;padding:14px;border:1px solid var(--hairline);border-radius:8px;background:var(--paper)}
  .sub-q .q-label{font-size:13px}
  .radio-list{display:flex;flex-direction:column;gap:8px;margin-top:10px}
  .radio-item{
    display:flex;gap:10px;align-items:flex-start;padding:10px 12px;
    border:1px solid var(--hairline-strong);border-radius:8px;cursor:pointer;
    background:var(--card);transition:border-color .12s;
  }
  .radio-item:hover{border-color:var(--grey-light)}
  .radio-item input{margin-top:3px;accent-color:var(--ink)}
  .radio-item.sel{border-color:var(--ink)}
  .radio-item .rt{font-size:13.5px;font-weight:500}
  .radio-item .rd{font-size:12.5px;color:var(--grey)}

  .stepper{display:inline-flex;align-items:center;border:1px solid var(--hairline-strong);border-radius:8px;overflow:hidden}
  .stepper button{border:none;background:transparent;width:40px;height:40px;font-size:18px;cursor:pointer;color:var(--ink);transition:background .12s}
  .stepper button:hover{background:var(--paper)}
  .stepper button:focus-visible{outline:2px solid var(--green);outline-offset:-2px}
  .stepper .val{min-width:44px;text-align:center;font-weight:600;font-variant-numeric:tabular-nums}

  select{
    font:inherit;font-size:13.5px;font-weight:500;color:var(--ink);
    border:1px solid var(--hairline-strong);border-radius:8px;
    padding:10px 12px;background:var(--card);width:100%;cursor:pointer;
  }
  select:focus-visible{outline:2px solid var(--green);outline-offset:1px}

  .toggle-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
  .switch{position:relative;width:42px;height:24px;flex:none}
  .switch input{position:absolute;opacity:0;width:100%;height:100%;cursor:pointer;margin:0}
  .switch .track{position:absolute;inset:0;border-radius:99px;background:var(--hairline-strong);transition:background .15s}
  .switch .thumb{
    position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;
    background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.2);transition:transform .15s;
  }
  .switch input:checked ~ .track{background:var(--green)}
  .switch input:checked ~ .track .thumb{transform:translateX(18px)}
  .switch input:focus-visible ~ .track{outline:2px solid var(--green);outline-offset:2px}

  details.adv{margin-top:12px}
  details.adv summary{
    font-size:12.5px;font-weight:500;color:var(--grey);cursor:pointer;
    list-style:none;display:inline-flex;align-items:center;gap:6px;
  }
  details.adv summary::-webkit-details-marker{display:none}
  details.adv summary::after{content:"▸";font-size:10px;transition:transform .15s}
  details.adv[open] summary::after{transform:rotate(90deg)}
  details.adv .adv-body{margin-top:10px;display:flex;flex-direction:column;gap:10px}
  .adv-field label{font-size:12.5px;font-weight:500;color:var(--grey);display:block;margin-bottom:6px}
  .adv-field input[type=number]{
    font:inherit;font-size:14px;border:1px solid var(--hairline-strong);border-radius:8px;
    padding:9px 12px;width:140px;font-variant-numeric:tabular-nums;
  }
  .kasse-note{font-size:12px;color:var(--grey);margin-top:8px;line-height:1.5}

  .ledger-wrap{position:sticky;top:20px}
  @media (max-width:880px){.ledger-wrap{position:static}}
  .ledger{padding:26px 26px 20px}
  .ledger-head{
    display:flex;justify-content:space-between;align-items:baseline;
    padding-bottom:14px;border-bottom:1px solid var(--ink);
  }
  .ledger-head .lh-title{font-weight:600;font-size:13px;letter-spacing:.06em;text-transform:uppercase}
  .ledger-head .lh-period{font-size:12px;color:var(--grey)}

  .split-bar{
    display:flex;gap:2px;height:8px;margin:2px 0 14px;border-radius:4px;overflow:hidden;
  }
  .split-bar .seg-b{
    height:100%;border-radius:2px;min-width:0;
    transition:width .4s cubic-bezier(.25,.7,.3,1);
  }
  .split-bar .s-net{background:var(--green)}
  .split-bar .s-d{background:var(--red)}

  .lrow{border-bottom:1px solid var(--hairline)}
  .lrow-main{
    width:100%;display:flex;justify-content:space-between;align-items:baseline;gap:12px;
    padding:12px 0;background:none;border:none;font:inherit;text-align:left;cursor:pointer;
  }
  .lrow-main:focus-visible{outline:2px solid var(--green);outline-offset:-2px;border-radius:4px}
  .lrow-main .ll{font-size:13.5px;color:var(--ink);display:flex;align-items:baseline;gap:8px}
  .lrow-main .ll .de{font-size:11.5px;color:var(--grey-light)}
  .lrow-main .lv{font-size:14px;font-weight:600;font-variant-numeric:tabular-nums;white-space:nowrap}
  .lv.deduct{color:var(--red)}
  .lv.zero{color:var(--grey-light);font-weight:500}
  .lrow-exp{max-height:0;overflow:hidden;transition:max-height .25s ease}
  .lrow.open .lrow-exp{max-height:300px}
  .lrow-exp .exp-inner{padding:2px 0 14px;font-size:12.5px;color:var(--grey);line-height:1.5}
  .lrow-exp .exp-inner b{color:var(--ink);font-weight:600}
  .caret{font-size:9px;color:var(--grey-light);transition:transform .2s}
  .lrow.open .caret{transform:rotate(90deg)}
  .lrow.gross .lrow-main{cursor:default;padding:14px 0}
  .lrow.gross .lv{font-size:15px}

  .lnet{display:flex;justify-content:space-between;align-items:baseline;padding:16px 0 6px}
  .lnet .nl{font-weight:600;font-size:14px}
  .lnet .nv{
    font-family:'Source Serif 4',Georgia,serif;font-weight:600;
    font-size:30px;color:var(--green);font-variant-numeric:tabular-nums;letter-spacing:-0.01em;
  }
  .lfoot{
    margin-top:12px;padding-top:12px;border-top:1px solid var(--hairline);
    display:flex;justify-content:space-between;align-items:center;gap:10px;
  }
  .lfoot .check{font-size:12px;color:var(--green);font-weight:500;display:flex;gap:6px;align-items:center}
  .lfoot .pct{font-size:12px;color:var(--grey)}
  .accuracy{margin-top:10px;font-size:11.5px;color:var(--grey-light);line-height:1.5}

  .quickstats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
  .qs{border:1px solid var(--hairline);border-radius:8px;background:var(--card);padding:12px 14px}
  .qs .qs-v{font-weight:600;font-size:16px;font-variant-numeric:tabular-nums}
  .qs .qs-l{font-size:11.5px;color:var(--grey);margin-top:2px;line-height:1.35}

  .optim{max-width:1080px;margin:56px auto 0;padding:0 24px}
  .optim h2{font-family:'Source Serif 4',Georgia,serif;font-weight:600;font-size:clamp(22px,3vw,28px);letter-spacing:-0.01em}
  .optim > p{color:var(--grey);margin-top:8px;max-width:620px}
  .cards{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:24px}
  @media (max-width:880px){.cards{grid-template-columns:1fr}}
  .card{padding:24px;transition:box-shadow .25s ease, transform .25s ease}
  .card:hover{box-shadow:var(--shadow-lift);transform:translateY(-2px)}
  .card h3{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .tag{
    font-size:10.5px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;
    color:var(--green);background:var(--green-soft);border-radius:5px;padding:3px 7px;
  }
  .card .lead{font-size:13px;color:var(--grey);margin-top:8px}
  .big-line{margin-top:16px;font-size:14px}
  .big-line .hl{font-weight:600;font-variant-numeric:tabular-nums}
  .hl.pos{color:var(--green)}

  .slider-row{display:flex;align-items:center;gap:14px;margin-top:18px}
  input[type=range]{
    flex:1;-webkit-appearance:none;appearance:none;height:4px;border-radius:2px;
    background:linear-gradient(to right,var(--green) var(--fill,0%),var(--hairline-strong) var(--fill,0%));
    outline:none;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;width:18px;height:18px;border-radius:50%;
    background:#fff;border:1.5px solid var(--ink);cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.15);
  }
  input[type=range]:focus-visible::-webkit-slider-thumb{outline:2px solid var(--green);outline-offset:2px}
  .slider-val{font-weight:600;font-variant-numeric:tabular-nums;min-width:110px;text-align:right;font-size:14px}

  .compare-table{width:100%;margin-top:16px;border-collapse:collapse;font-size:13px}
  .compare-table th{
    text-align:left;font-weight:500;color:var(--grey);font-size:11.5px;
    text-transform:uppercase;letter-spacing:.05em;padding:8px 0;border-bottom:1px solid var(--hairline-strong);
  }
  .compare-table td{padding:9px 0;border-bottom:1px solid var(--hairline);font-variant-numeric:tabular-nums}
  .compare-table td:last-child, .compare-table th:last-child{text-align:right}
  .compare-table tr.best td{font-weight:600}
  .compare-table tr.best td:last-child{color:var(--green)}
  .fine{font-size:12px;color:var(--grey);margin-top:12px;line-height:1.5}

  .note-banner{
    margin-top:20px;grid-column:1/-1;padding:16px 20px;font-size:13px;color:var(--grey);
    border:1px solid var(--hairline);border-radius:var(--radius);background:var(--card);display:none;
  }
  .note-banner b{color:var(--ink)}
  .note-banner.show{display:block}

  .verified{max-width:1080px;margin:64px auto 0;padding:0 24px}
  .verified .panel{padding:28px}
  .verified h2{font-size:15px;font-weight:600;display:flex;gap:10px;align-items:center}
  .verified .sub{font-size:13px;color:var(--grey);margin-top:6px;max-width:680px}
  .rates{width:100%;margin-top:18px;border-collapse:collapse;font-size:13px}
  .rates th{
    text-align:left;font-weight:500;color:var(--grey);font-size:11.5px;text-transform:uppercase;
    letter-spacing:.05em;padding:8px 0;border-bottom:1px solid var(--hairline-strong);
  }
  .rates td{padding:9px 0;border-bottom:1px solid var(--hairline);vertical-align:top}
  .rates td.num{font-weight:500}
  .conf{font-size:11px;font-weight:600;border-radius:5px;padding:2px 7px;white-space:nowrap}
  .conf.hi{color:var(--green);background:var(--green-soft)}
  .conf.med{color:#8a6d1f;background:#f7f1df}
  @media(max-width:640px){.rates .src{display:none}}

  footer{
    max-width:1080px;margin:56px auto 0;padding:36px 24px 44px;
    border-top:1px solid var(--hairline);
    display:grid;grid-template-columns:1fr 1fr;gap:28px 64px;
    font-size:12.5px;color:var(--grey);
  }
  footer .fcol{line-height:1.65}
  .foot-bottom{
    grid-column:1/-1;display:flex;justify-content:space-between;align-items:baseline;
    gap:12px 24px;flex-wrap:wrap;border-top:1px solid var(--hairline);padding-top:18px;margin-top:6px;
  }
  @media (max-width:720px){
    footer{grid-template-columns:1fr;gap:22px}
  }
  footer b{color:var(--ink);font-weight:600}
  .legal-links{display:flex;gap:16px}
  .legal-links button{
    background:none;border:none;font:inherit;font-size:12.5px;color:var(--grey);
    cursor:pointer;padding:0;text-decoration:underline;text-underline-offset:3px;
  }
  .legal-links button:hover{color:var(--ink)}
  .foot-meta{font-size:11.5px;color:var(--grey-light)}
  .foot-meta a{color:var(--grey);text-decoration:underline;text-underline-offset:3px}
  .foot-meta a:hover{color:var(--ink)}
  .legal-page{max-width:1080px;margin:24px auto 0;padding:0 24px}
  .legal-page .panel{padding:28px;font-size:13.5px;line-height:1.65;color:var(--grey)}
  .legal-page h2{font-size:16px;font-weight:600;color:var(--ink);margin-bottom:12px}
  .legal-page h3{font-size:13.5px;font-weight:600;color:var(--ink);margin:18px 0 6px}
  .legal-page p{margin:8px 0}
  .legal-page .ph{background:#fdf3d7;border-radius:4px;padding:1px 5px;color:#8a6d1f;font-weight:500}

  .sticky-net{
    position:fixed;left:12px;right:12px;bottom:12px;z-index:40;
    display:none;align-items:baseline;justify-content:space-between;gap:12px;
    background:var(--ink);color:#fff;border-radius:12px;
    padding:12px 18px calc(12px + env(safe-area-inset-bottom, 0px));
    box-shadow:0 6px 24px rgba(23,24,26,.28);cursor:pointer;border:none;
    font:inherit;text-align:left;width:auto;
  }
  .sticky-net .sl{font-size:12.5px;font-weight:500;color:rgba(255,255,255,.75)}
  .sticky-net .sv{
    font-family:'Source Serif 4',Georgia,serif;font-weight:600;font-size:21px;
    color:#7fd4b5;font-variant-numeric:tabular-nums;letter-spacing:-0.01em;
  }
  .sticky-net:focus-visible{outline:2px solid #7fd4b5;outline-offset:2px}
  @media (max-width:880px){
    .sticky-net.show{display:flex}
  }

  @media print{
    .topright,.hero,.form,.optim,.verified,.legal-page,footer,
    .quickstats,.sticky-net,#regimeNote{display:none!important}
    .topbar{padding:0 0 16px}
    .tool{display:block;margin:0;padding:0;max-width:none}
    .ledger-wrap{position:static}
    .panel{box-shadow:none;border:1px solid #bbb}
    body{background:#fff}
    .split-bar .seg-b{transition:none}
  }

  /* Smartphone- und Tablet-Anpassungen */
  @media (max-width:640px){
    body{font-size:14.5px}
    .topbar{padding:14px 16px;gap:10px}
    .topright{gap:6px}
    .pill{font-size:11px;padding:4px 9px}
    .hero{padding:28px 16px 4px}
    .hero h1{font-size:27px}
    .hero p{font-size:15px;margin-top:10px}
    .tool{padding:0 12px;margin-top:24px;gap:18px}
    .form{padding:18px 16px}
    .q{padding:16px 0}
    .ledger{padding:20px 16px 16px}
    .lnet .nv{font-size:26px}
    .money-row{flex-wrap:wrap}
    .money-input{min-width:180px}
    .money-input input{font-size:17px}
    .seg{flex-wrap:wrap}
    .seg button{flex:1 1 auto;min-width:46%;padding:11px 8px;font-size:13px;
      border-bottom:1px solid var(--hairline)}
    .seg.small button{min-width:0;flex:1 1 auto}
    .slider-row{flex-wrap:wrap}
    .slider-val{text-align:left;min-width:0;flex-basis:100%}
    .optim{padding:0 12px;margin-top:40px}
    .cards{gap:14px;margin-top:18px}
    .card{padding:18px 16px}
    .compare-table{font-size:12px}
    .compare-table td,.compare-table th{padding:7px 0}
    .verified{padding:0 12px;margin-top:44px}
    .verified .panel{padding:18px 16px}
    .rates{font-size:12px}
    .rates td,.rates th{padding:7px 0}
    .legal-page{padding:0 12px}
    .legal-page .panel{padding:18px 16px}
    footer{padding:22px 16px 40px}
    .quickstats{grid-template-columns:1fr 1fr;gap:8px}
    .qs{padding:10px 12px}
  }
  @media (max-width:380px){
    .quickstats{grid-template-columns:1fr}
    .seg button{min-width:100%}
    .seg.small button{min-width:0}
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="wordmark">netto<span>klar</span></div>
  <nav class="topnav" aria-label="Bereiche">
    <a href="#rechner" id="navCalc"></a>
    <a href="#optimieren" id="navOptim"></a>
    <button id="navVerified" type="button"></button>
  </nav>
  <div class="topright">
    <div class="pill" id="pillPrivacy"></div>
    <button class="pill pill-btn" id="pillVerifiedBtn" aria-expanded="false" aria-controls="verifiedSec"><b>✓</b> <span id="pillVerified"></span></button>
    <div class="lang" role="group" aria-label="Sprache / Language">
      <button id="langDe" aria-pressed="true">DE</button>
      <button id="langEn" aria-pressed="false">EN</button>
    </div>
  </div>
</div>

if (typeof window !== "undefined" && window.top !== window.self){ try{ window.top.location = window.self.location; }catch(e){ document.documentElement.hidden = true; } }

/* =====================================================================
   RECHENKERN / CALCULATION CORE - Deutschland 2026
   Jede Konstante trägt Quelle + Prüfstatus. Alle Werte gegen amtliche Quellen bestätigt.
   ===================================================================== */
const C = {
  // §32a EStG Tarif 2026 (Steuerfortentwicklungsgesetz).
  // Alle Konstanten inkl. Zone 4/5 amtlich bestätigt:
  // BMF-PAP 2026 (endgültige, korrigierte Fassung, 12.11.2025), UPTAB26.
  tarif: {
    gfb: 12348, z2end: 17799, z3end: 69878, z4end: 277825,
    p2a: 914.51, p2b: 1400,
    p3a: 173.10, p3b: 2397, p3c: 1034.87,
    p4rate: 0.42, p4sub: 11135.63,
    p5rate: 0.45, p5sub: 19470.38,
    // Grenzwerte Steuerklasse V/VI (§39b Abs. 2 Satz 7 EStG), PAP 2026 MPARA
    w1stkl5: 14071, w2stkl5: 34939, w3stkl5: 222260
  },
  werbungskosten: 1230,        // §9a EStG - bestätigt: PAP 2026 (ANP = 1230)
  sonderausgaben: 36,          // §10c EStG - bestätigt: PAP 2026 (SAP = 36)
  entlastungAllein: 4260,      // §24b EStG - bestätigt: PAP 2026 (EFA = 4260)
  entlastungAlleinPlus: 240,
  kinderfreibetragFull: 9756,  // §32(6) EStG - bestätigt: PAP 2026 (9.756 bzw. 4.878 halb)
  soliRate: 0.055,
  soliMilderung: 0.119,
  soliFreigrenze: 20350,       // §3 SolzG - bestätigt: PAP 2026 (SOLZFREI = 20350)
  kvBase: 0.146,
  zusatzDefault: 2.9,          // Ø-Zusatzbeitrag 2026, BMG - geprüft Jul 2026
  bbgKVmonth: 5812.50,
  rvEmployee: 0.093,
  avEmployee: 0.013,
  bbgRVmonth: 8450,
  pvEmployeeBase: 0.018,
  pvEmployeeSachsen: 0.023,
  pvChildlessSurcharge: 0.006,
  pvChildReduction: 0.0025,
  privEmployerCapKV: 508.59,   // Max. AG-Zuschuss KV 2026 (= pkvAgKvRate × BBG 5.812,50) - bestätigt
  privEmployerCapPV: 104.63,   // Max. AG-Zuschuss PV 2026 (= 1,8 % × BBG 5.812,50) - bestätigt
  pkvAgKvRate: 0.0875,         // Fiktiver AG-Anteil KV: (14,6 % + Ø-Zusatzbeitrag 2,9 %) / 2 (§257 Abs. 2 SGB V)
  bavSvFree: 338,
  bavTaxFree: 676,
  jaegMonth: 6450,             // Versicherungspflichtgrenze (JAEG) 2026: 77.400 €/Jahr
                               // SV-RechengrößenVO 2026, BGBl. 26.11.2025 - bestätigt
                               // Hinweis 2027: Sonderanhebung auf ca. 84.600 € geplant (GKV-BStabG)
  // Geringfügig / Übergangsbereich 2026
  mindestlohn: 13.90,          // MiLoG-Anpassung zum 1.1.2026 - bestätigt
  minijobGrenze: 603,          // = Mindestlohn × 130 / 3, aufgerundet (§8 Abs. 1a SGB IV) - bestätigt
  midijobMax: 2000,            // Übergangsbereich-Obergrenze (§20 SGB IV, seit 2023)
  minijobRvEmployee: 0.036     // AN-Aufstockung zur RV im Minijob (18,6 % − 15 % AG-Pauschale)
};

/* Zusatzbeiträge 2026 - Quellen: Kassenmeldungen 2025/26 (Ärzteblatt 29.12.2025,
   t-online 05.01.2026, krankenkasseninfo.de 07/2026). Amtliche tagesaktuelle Liste:
   GKV-Spitzenverband (§242 Abs. 5 SGB V). TODO: vor Launch abgleichen. */
const KASSEN = [
  ["__avg", 2.90],
  ["Techniker Krankenkasse (TK)", 2.69],
  ["Barmer", 3.29],
  ["DAK-Gesundheit", 3.20],
  ["AOK Baden-Württemberg", 2.99],
  ["AOK Bayern", 2.69],
  ["AOK Bremen/Bremerhaven", 3.29],
  ["AOK Hessen", 2.98],
  ["AOK Niedersachsen", 2.98],
  ["AOK Nordost", 3.50],
  ["AOK NordWest", 2.99],
  ["AOK PLUS (Sachsen/Thüringen)", 3.10],
  ["AOK Rheinland/Hamburg", 3.29],
  ["AOK Rheinland-Pfalz/Saarland", 2.47],
  ["AOK Sachsen-Anhalt", 2.89],
  ["IKK classic", 3.40],
  ["hkk Krankenkasse", 2.59],
  ["HEK (Hanseatische Krankenkasse)", 2.89],
  ["Audi BKK", 2.60],
  ["BIG direkt gesund", 3.69],
  ["__other", null]
];

const LAENDER = [
  ["BW","Baden-Württemberg","Baden-Württemberg",0.08],
  ["BY","Bayern","Bavaria (Bayern)",0.08],
  ["BE","Berlin","Berlin",0.09],
  ["BB","Brandenburg","Brandenburg",0.09],
  ["HB","Bremen","Bremen",0.09],
  ["HH","Hamburg","Hamburg",0.09],
  ["HE","Hessen","Hesse (Hessen)",0.09],
  ["MV","Mecklenburg-Vorpommern","Mecklenburg-Vorpommern",0.09],
  ["NI","Niedersachsen","Lower Saxony (Niedersachsen)",0.09],
  ["NW","Nordrhein-Westfalen","North Rhine-Westphalia",0.09],
  ["RP","Rheinland-Pfalz","Rhineland-Palatinate",0.09],
  ["SL","Saarland","Saarland",0.09],
  ["SN","Sachsen","Saxony (Sachsen)",0.09],
  ["ST","Sachsen-Anhalt","Saxony-Anhalt",0.09],
  ["SH","Schleswig-Holstein","Schleswig-Holstein",0.09],
  ["TH","Thüringen","Thuringia (Thüringen)",0.09]
];

/* UPTAB26 exakt nach PAP 2026: X wird vom Aufrufer auf volle Euro abgerundet
   (Ausnahme: 1,25-/0,75-Vielfache in UP5-6), Y auf 6 Dezimalstellen abgeschnitten,
   ST auf volle Euro abgerundet. */
const trunc6 = v => Math.floor(v*1e6)/1e6;
function tarif(x){
  const t = C.tarif;
  if (x < t.gfb + 1) return 0;
  if (x < t.z2end + 1){ const y = trunc6((x - t.gfb)/10000); return Math.floor((t.p2a*y + t.p2b)*y); }
  if (x < t.z3end + 1){ const z = trunc6((x - t.z2end)/10000); return Math.floor((t.p3a*z + t.p3b)*z + t.p3c); }
  if (x < t.z4end + 1) return Math.floor(t.p4rate*x - t.p4sub);
  return Math.floor(t.p5rate*x - t.p5sub);
}
function tarifSplitting(zvE){ return 2 * tarif(Math.floor(zvE/2)); }
/* Steuerklasse V/VI exakt nach PAP 2026 (MST5-6 / UP5-6, §39b Abs. 2 Satz 7 EStG). */
function tarifClassV(zvE){
  const t = C.tarif;
  const up56 = zx => {
    const diff = (tarif(Math.floor(zx*1.25)) - tarif(Math.floor(zx*0.75))) * 2;
    const mist = Math.floor(zx * 0.14);
    return Math.max(mist, diff);
  };
  const zzx = Math.floor(Math.max(0, zvE));
  let st;
  if (zzx > t.w2stkl5){
    st = up56(t.w2stkl5);
    st += Math.floor((Math.min(zzx, t.w3stkl5) - t.w2stkl5) * 0.42);
    if (zzx > t.w3stkl5) st += Math.floor((zzx - t.w3stkl5) * 0.45);
  } else {
    st = up56(zzx);
    if (zzx > t.w1stkl5){
      const vergl = st;
      const hoch = Math.floor(up56(t.w1stkl5) + (zzx - t.w1stkl5) * 0.42);
      st = Math.min(hoch, vergl);
    }
  }
  return st;
}

function calc(p){
  const g = p.grossM;
  const isSachsen = LAENDER[p.landIdx][0]==="SN";

  /* --- Beschäftigungs-Regime / employment regime --- */
  // minijob: bis Geringfügigkeitsgrenze (unabhängig vom Typ)
  // midijob: Übergangsbereich mit gleitender AN-Beitragsbemessung (§20 Abs. 2a SGB IV)
  // werkstudent: KV/PV/AV-frei (Werkstudentenprivileg), nur RV
  let regime = "standard";
  if (g > 0 && g <= C.minijobGrenze) regime = "minijob";
  else if (p.workerType === "werkstudent") regime = "werkstudent";
  else if (g < C.midijobMax) regime = "midijob";

  /* --- Minijob: pauschal besteuert durch AG, AN zahlt nur RV-Aufstockung --- */
  if (regime === "minijob"){
    const rv = p.minijobRvOptOut ? 0 : g * C.minijobRvEmployee;
    return { g, lst:0, soli:0, church:0, kv:0, pv:0, pvRate:0, rv, av:0,
             net: g - rv, aboveKV:false, aboveRV:false,
             insurance:p.insurance, regime };
  }

  /* --- beitragspflichtige Einnahme (AN-Seite) ---
     Übergangsbereich seit 10/2022: BE_AN steigt linear von 0 (an der
     Geringfügigkeitsgrenze) bis zum vollen Entgelt (bei 2.000 €). */
  let svBase = g;
  if (regime === "midijob" || (regime === "werkstudent" && g <= C.midijobMax)){
    svBase = (C.midijobMax / (C.midijobMax - C.minijobGrenze)) * (g - C.minijobGrenze);
    svBase = Math.max(0, Math.min(svBase, g));
  }

  let kv=0, pv=0, privEmployee=0, pkvZuKV=0, pkvZuPV=0;
  const rvB = Math.min(svBase, C.bbgRVmonth);
  const rv = rvB * C.rvEmployee;
  const av = (regime === "werkstudent") ? 0 : rvB * C.avEmployee;

  // Persönlicher PV-Satz. Er gilt auch in der Vorsorgepauschale: Der maschinelle
  // PAP 2026 rechnet dort mit PVZ (Kinderlosenzuschlag) und PVA (Abschläge).
  let pvRate = isSachsen ? C.pvEmployeeSachsen : C.pvEmployeeBase;
  if (p.kids === 0 && p.age23) pvRate += C.pvChildlessSurcharge;
  if (p.kids >= 2) pvRate -= C.pvChildReduction * Math.min(p.kids - 1, 4);

  if (regime === "werkstudent"){
    // Werkstudentenprivileg: keine KV/PV/AV über die Beschäftigung.
  } else if (p.insurance === "public"){
    const kvB = Math.min(svBase, C.bbgKVmonth);
    kv = kvB * (0.073 + (p.zusatzPct/100)/2);
    pv = kvB * pvRate;
  } else {
    /* PKV-Arbeitgeberzuschuss exakt nach §257 SGB V / §61 SGB XI: je die Hälfte
       der Prämie, höchstens der fiktive Arbeitgeberanteil aus dem tatsächlichen
       Entgelt bis zur BBG (KV: 7,3 % + halber Ø-Zusatzbeitrag = 8,75 %;
       PV: Arbeitgebersatz 1,8 %, in Sachsen 1,3 %). */
    const base = Math.min(g, C.bbgKVmonth);
    pkvZuKV = Math.min(p.pkvKv / 2, C.pkvAgKvRate * base);
    pkvZuPV = Math.min(p.pkvPv / 2, (isSachsen ? 0.013 : 0.018) * base);
    privEmployee = Math.max(0, p.pkvKv + p.pkvPv - pkvZuKV - pkvZuPV);
  }

  const gY = (p.grossY !== undefined) ? p.grossY : g * 12;
  /* Vorsorgepauschale exakt nach dem maschinellen PAP 2026 (UPEVP, MVSPKVPV,
     MVSPHB; §39b Abs. 2 Satz 5 Nr. 3 EStG), BMF vom 12.11.2025:
     - VSPR: RV-Teil bis BBG RV (entfällt bei KRV = 1).
     - VSPKVPV gesetzlich: fiktive Beträge = ZRE4VP (bis BBG KV) × (7,0 % erm.
       + halber Zusatzbeitrag + persönlicher PV-Satz inkl. PVZ/PVA/PVS).
       Gilt auch für Werkstudenten (gesetzlich versichert, PKV = 0).
     - VSPKVPV privat: Basisbeiträge (PKPV × 12) abzüglich des steuerfreien
       Arbeitgeberzuschusses (PKPVAGZ × 12), nicht unter 0; in Klasse VI = 0.
     - MVSPHB (ALV-Vergleichswert, Deckel 1.900 €) nur bei ALV-Pflicht und
       nicht in Klasse VI; er läuft auch im PKV-Fall. */
  const trunc2 = v => Math.floor(v*100)/100;
  const alvFrei = (p._alv === 1) || regime === "werkstudent";
  const zre4vpRV = Math.min(gY, C.bbgRVmonth*12);
  const zre4vpKV = Math.min(gY, C.bbgKVmonth*12);
  const vspr = (p._krv === 1) ? 0 : trunc2(zre4vpRV * C.rvEmployee);
  let vspkvpv;
  if (p.insurance === "public" || regime === "werkstudent"){
    vspkvpv = trunc2(zre4vpKV * (0.070 + (p.zusatzPct/100)/2 + pvRate));
  } else if (p.taxClass === 6){
    vspkvpv = 0;
  } else {
    const pkpvM = (p.pkpv !== undefined && p.pkpv !== null && p.pkpv > 0)
      ? p.pkpv : (p.pkvKv + p.pkvPv);
    vspkvpv = trunc2(pkpvM * 12) - trunc2((pkvZuKV + pkvZuPV) * 12);
    if (vspkvpv < 0) vspkvpv = 0;
  }
  let vsp = Math.ceil(vspkvpv + vspr);
  if (!alvFrei && p.taxClass !== 6){
    const vspalv = trunc2(zre4vpRV * C.avEmployee);
    const vsphb = Math.min(vspalv + vspkvpv, 1900);
    const vspn = Math.ceil(vspr + vsphb);
    if (vspn > vsp) vsp = vspn;
  }
  // Steuerklasse VI: kein Arbeitnehmer-Pauschbetrag, kein Sonderausgaben-Pauschbetrag (PAP MZTABFB)
  let zvE = gY - (p.taxClass === 6 ? 0 : C.werbungskosten + C.sonderausgaben) - vsp;
  // EFA hängt nach PAP (MZTABFB) allein an Steuerklasse II; der Erhöhungsbetrag
  // von 240 € gilt je Kind ab dem zweiten.
  if (p.taxClass === 2)
    zvE -= C.entlastungAllein + C.entlastungAlleinPlus * Math.max(0, p.kids - 1);
  zvE = Math.max(0, zvE);

  let lstY;
  if (p.taxClass === 3)       lstY = tarifSplitting(zvE);
  else if (p.taxClass >= 5)   lstY = tarifClassV(zvE);
  else                        lstY = tarif(Math.floor(zvE));

  const kfbFactor = (p.taxClass === 3) ? 1 : (p.taxClass === 6 ? 0 : 0.5);
  const zvE_kids = Math.max(0, zvE - p.kids * C.kinderfreibetragFull * kfbFactor);
  let lstKidsY;
  if (p.taxClass === 3)       lstKidsY = tarifSplitting(zvE_kids);
  else if (p.taxClass >= 5)   lstKidsY = tarifClassV(zvE_kids);
  else                        lstKidsY = tarif(Math.floor(zvE_kids));

  const fg = C.soliFreigrenze * (p.taxClass === 3 ? 2 : 1);
  let soliY = 0;
  if (lstKidsY > fg) soliY = Math.min(C.soliRate * lstKidsY, C.soliMilderung * (lstKidsY - fg));

  const churchY = p.church ? LAENDER[p.landIdx][3] * lstKidsY : 0;

  const lst = lstY/12, soli = soliY/12, church = churchY/12;
  const hi = (regime === "werkstudent") ? 0 : (p.insurance === "public") ? kv : privEmployee;
  const pvOut = (regime === "werkstudent") ? 0 : (p.insurance === "public") ? pv : 0;
  const net = g - (lst + soli + church + hi + pvOut + rv + av);

  return { g, lst, soli, church, kv: hi, pv: pvOut, pvRate, rv, av, net,
           pkvZuKV, pkvZuPV, pkvZuschuss: pkvZuKV + pkvZuPV,
           aboveKV: g > C.bbgKVmonth, aboveRV: g > C.bbgRVmonth,
           insurance: p.insurance, regime };
}

  impBody:`<p>Angaben gemäß §5 DDG:</p>
<p>Lars Eilermann<br><span class="ph">[Straße und Hausnummer]</span><br><span class="ph">[PLZ und Ort]</span><br>Deutschland</p>
<p>Kontakt: <span class="ph">[E-Mail-Adresse]</span></p>
<h3>Haftung für Inhalte</h3>
<p>Diese Seite ist ein Rechenwerkzeug und ersetzt keine Steuer- oder Rechtsberatung. Alle Berechnungen erfolgen nach bestem Wissen auf Grundlage der im Abschnitt "Geprüft für 2026" dokumentierten Rechtsquellen, ohne Gewähr für Vollständigkeit und Richtigkeit im Einzelfall. Verbindlich ist allein die Abrechnung deines Arbeitgebers bzw. der Bescheid des Finanzamts.</p>

<p>Für Inhalte verlinkter externer Seiten sind ausschließlich deren Betreiber verantwortlich.</p>`,
  dsH:"Datenschutzerklärung",
  dsBody:`<p><b>Kurzfassung: Diese Seite erhebt selbst keine Daten.</b> Deine Eingaben (Gehalt, Familiensituation, Kirchenmitgliedschaft, Versicherung) werden ausschließlich lokal in deinem Browser verarbeitet. Es gibt keine Übertragung an einen Server, keine Speicherung, keine Cookies, kein Tracking und keine Analyse-Dienste.</p>
<h3>Verantwortlicher</h3>
<p>Lars Eilermann, <span class="ph">[Anschrift wie im Impressum]</span>, E-Mail: <span class="ph">[E-Mail-Adresse]</span></p>
<h3>Berechnung im Browser</h3>
<p>Sämtliche Berechnungen laufen als JavaScript auf deinem Gerät. Die Seite hat technisch keine Möglichkeit, deine Eingaben einzusehen: Es existiert kein Berechnungs-Server. Auch der lokale Speicher des Browsers (Cookies, localStorage) wird nicht genutzt; nach dem Schließen des Tabs sind alle Eingaben weg.</p>
<h3>Hosting und Server-Logfiles</h3>
<p>Die Seite wird über GitHub Pages ausgeliefert (GitHub, Inc., USA / GitHub B.V., Niederlande). Beim Abruf verarbeitet GitHub technisch bedingt Verbindungsdaten wie deine IP-Adresse, Zeitpunkt des Abrufs und Browser-Kennung in Server-Logfiles, um die Seite auszuliefern und Angriffe abzuwehren. Rechtsgrundlage ist Art. 6 Abs. 1 lit. f DSGVO (berechtigtes Interesse am sicheren Betrieb). GitHub ist unter dem EU-US Data Privacy Framework zertifiziert. Näheres in der Datenschutzerklärung von GitHub (github.com/privacy).</p>
<h3>Schriften und Nachladen von Daten</h3>
<p>Alle Schriftarten sind direkt in die Seite eingebettet; es werden keine Schriften von Google oder anderen Drittanbietern geladen. Die Seite lädt lediglich eine kleine Datendatei mit aktuellen Krankenkassen-Beitragssätzen vom selben Server, von dem auch die Seite selbst stammt.</p>
<h3>Deine Rechte</h3>
<p>Dir stehen die Rechte aus Art. 15 bis 21 DSGVO zu (Auskunft, Berichtigung, Löschung, Einschränkung, Datenübertragbarkeit, Widerspruch) sowie das Beschwerderecht bei einer Datenschutz-Aufsichtsbehörde. Da diese Seite keine personenbezogenen Daten erhebt oder speichert, laufen Auskunftsersuchen in der Regel ins Leere; wende dich für Daten aus den Server-Logs an GitHub.</p>
<p>Stand: Juli 2026</p>`,

    soliZero:()=>`<b>0 €. Und das ist korrekt.</b> Der Soli wurde 2021 für rund neun von zehn Beschäftigten abgeschafft. Er fällt nur noch bei hohen Einkommen an. Du liegst unter der Grenze.`,

    pkv:{l:"Private Kranken- & Pflegeversicherung",de:"PKV",exp:(s,r)=>`Deine Prämie von <b>${eur(s.pkvKv + s.pkvPv)} €</b> abzüglich des steuerfreien Arbeitgeberzuschusses von <b>${eur(r.pkvZuschuss)} €</b> (${eur(r.pkvZuKV)} € Kranken, ${eur(r.pkvZuPV)} € Pflege). Der Zuschuss beträgt die Hälfte deiner Prämie, höchstens den Arbeitgeberanteil, der sich aus deinem Gehalt bis zur Beitragsbemessungsgrenze ergäbe (§257 SGB V). Anders als in der GKV hängt die Prämie von Tarif und Eintrittsalter ab, nicht vom Einkommen.`},
    pv:{l:"Pflegeversicherung",de:"",exp:(s,r)=>`Sichert Pflege im Alter oder nach Krankheit ab. Dein persönlicher Satz: <b>${pct2(r.pvRate*100)} %</b>${s.kids===0&&s.age23?`, darin steckt der Zuschlag von <b>+0,6 %</b> für Mitglieder ohne Kinder ab 23`:``}${s.kids>=2?`, reduziert, weil du ${s.kids} Kinder hast`:``}${LAENDER[s.landIdx][0]==="SN"?`, in Sachsen tragen Beschäftigte einen höheren Anteil`:``}. Der Arbeitgeber zahlt seinen Anteil dazu.`},
    rv:{l:"Rentenversicherung",de:"",exp:(s,r)=>`<b>9,3 %</b> deines Gehalts in die gesetzliche Rente. Dein Arbeitgeber verdoppelt das 1:1, es fließen also <b>18,6 %</b> in deine Altersvorsorge. Jeder Monat baut außerdem Anspruch auf Erwerbsminderungsschutz auf.${r.aboveRV?` Du liegst über der Grenze von <b>8.450 €</b>, auf den Teil darüber wird nichts erhoben.`:``}`},
    av:{l:"Arbeitslosenversicherung",de:"",exp:()=>`<b>1,3 %</b> (der Arbeitgeber zahlt dasselbe). <b>Dafür bekommst du:</b> Bei Jobverlust rund 60 % deines Nettos (67 % mit Kind) für bis zu ein Jahr, berechnet vom Netto, weshalb auch die Steuerklasse hier eine Rolle spielt.`}

  moreBody:'<p class="lead"><b>File a tax return.</b> Most employees get money back, on average over €1,000. A voluntary return can go back up to four years.</p><p class="lead"><b>Register an allowance (Freibetrag).</b> High work expenses, say for commuting? An allowance registered with the tax office lowers your income tax immediately, every month, instead of waiting for the return. From 2026 the commuter allowance is 38 cents from the first kilometre.</p><p class="lead"><b>Tax-free extras instead of a raise.</b> Benefits in kind up to €50 a month, a job ticket, a childcare subsidy or a company phone for private use reach you without deductions. Your employer decides, and asking costs nothing.</p><p class="lead"><b>Claim capital-forming payments (VL).</b> Many employers pay up to €40 a month into a savings contract, but only if you apply. If you never have, that money simply goes unclaimed.</p>',

<p>This page is a calculation tool and no substitute for tax or legal advice. All calculations are made to the best of our knowledge based on the legal sources documented in the "Verified for 2026" section, without guarantee of completeness or accuracy in individual cases. Only your employer's payslip and the tax office's assessment are binding.</p>

  dsH:"Privacy policy",
  dsBody:`<p><i>The German version is the legally binding one.</i></p>
<p><b>In short: this page itself collects no data.</b> Your inputs (salary, family situation, church membership, insurance) are processed exclusively in your browser. There is no transmission to a server, no storage, no cookies, no tracking and no analytics.</p>
<h3>Controller</h3>
<p>Lars Eilermann, <span class="ph">[address as in the legal notice]</span>, email: <span class="ph">[email address]</span></p>
<h3>Calculation in the browser</h3>
<p>All calculations run as JavaScript on your device. The page technically cannot see your inputs: there is no calculation server. Browser storage (cookies, localStorage) is not used either; closing the tab discards all inputs.</p>
<h3>Hosting and server logs</h3>
<p>The page is served via GitHub Pages (GitHub, Inc., USA / GitHub B.V., Netherlands). When you access it, GitHub necessarily processes connection data such as your IP address, time of access and browser identifier in server logs to deliver the page and fend off attacks. Legal basis: Art. 6(1)(f) GDPR (legitimate interest in secure operation). GitHub is certified under the EU-US Data Privacy Framework. See GitHub's privacy statement (github.com/privacy).</p>
<h3>Fonts and loaded data</h3>
<p>All fonts are embedded directly in the page; no fonts are loaded from Google or other third parties. The page only loads a small data file with current health-insurer rates from the same server the page itself comes from.</p>
<h3>Your rights</h3>
<p>You have the rights under Art. 15 to 21 GDPR (access, rectification, erasure, restriction, portability, objection) and the right to lodge a complaint with a supervisory authority. Since this page neither collects nor stores personal data, access requests will usually come up empty; for server-log data, contact GitHub.</p>
<p>Last updated: July 2026</p>`,

function parseMoney(s){
  s = String(s).replace(/[^\d,\.]/g,"");
  if (s.includes(",")) s = s.replace(/\./g,"").replace(",",".");
  else if ((s.match(/\./g)||[]).length > 1) s = s.replace(/\./g,"");
  const v = parseFloat(s); return isNaN(v) ? 0 : v;
}

function rowDefs(r){
  const R = T.rows, s = state, defs = [];
  const reg = r.regime;
  if (reg === "minijob"){
    defs.push({id:"lst", l:R.lst.l, de:R.lst.de, v:0, exp:R.mjLst()});
    defs.push({id:"kv", l:R.kv.l, de:R.kv.de, v:0, exp:R.exempt()});
    defs.push({id:"rv", l:R.rv.l, de:R.rv.de, v:r.rv, exp:R.mjRv(s)});
    defs.push({id:"av", l:R.av.l, de:R.av.de, v:0, exp:R.exempt()});
    defs.push({id:"pv", l:R.pv.l, de:R.pv.de, v:0, exp:R.exempt()});
    return defs;
  }
  defs.push({id:"lst", l:R.lst.l, de:R.lst.de, v:r.lst, exp:R.lst.exp()});
  if (r.church > 0.005) defs.push({id:"church", l:R.church.l, de:R.church.de, v:r.church, exp:R.church.exp(s)});
  defs.push({id:"soli", l:R.soli.l, de:R.soli.de, v:r.soli,
    exp: r.soli < 0.005 ? R.soliZero() : R.soli.exp()});
  if (reg === "werkstudent"){
    defs.push({id:"kv", l:R.kv.l, de:R.kv.de, v:0, exp:R.exempt()});
    defs.push({id:"rv", l:R.rv.l, de:R.rv.de, v:r.rv, exp:R.rv.exp(s,r)});
    defs.push({id:"av", l:R.av.l, de:R.av.de, v:0, exp:R.exempt()});
    defs.push({id:"pv", l:R.pv.l, de:R.pv.de, v:0, exp:R.exempt()});
    return defs;
  }
  if (r.insurance === "public"){
    defs.push({id:"kv", l:R.kv.l, de:R.kv.de, v:r.kv, exp:R.kv.exp(s,r)});
    defs.push({id:"rv", l:R.rv.l, de:R.rv.de, v:r.rv, exp:R.rv.exp(s,r)});
    defs.push({id:"av", l:R.av.l, de:R.av.de, v:r.av, exp:R.av.exp()});
    defs.push({id:"pv", l:R.pv.l, de:R.pv.de, v:r.pv, exp:R.pv.exp(s,r)});
  } else {
    defs.push({id:"kv", l:R.pkv.l, de:R.pkv.de, v:r.kv, exp:R.pkv.exp(s,r)});
    defs.push({id:"rv", l:R.rv.l, de:R.rv.de, v:r.rv, exp:R.rv.exp(s,r)});
    defs.push({id:"av", l:R.av.l, de:R.av.de, v:r.av, exp:R.av.exp()});
  }
  return defs;
}

/* Netto zaehlt weich zum neuen Wert (Respekt vor prefers-reduced-motion). */
let netShown = null, netRaf = 0;
const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)");
function tweenNet(target){
  const el = document.getElementById("vNet");
  if (netShown === null || reducedMotion.matches){
    netShown = target; el.textContent = eur(target) + " €"; return;
  }
  const from = netShown, t0 = performance.now(), dur = 240;
  cancelAnimationFrame(netRaf);
  const step = now => {
    const k = Math.min(1, (now - t0) / dur);
    const e = 1 - Math.pow(1 - k, 3);
    netShown = from + (target - from) * e;
    el.textContent = eur(netShown) + " €";
    if (k < 1) netRaf = requestAnimationFrame(step);
    else { netShown = target; el.textContent = eur(target) + " €"; }
  };
  netRaf = requestAnimationFrame(step);
}

/* Verteilungsleiste: ein Blick zeigt, wie sich das Brutto aufteilt. */
function updateSplitBar(r){
  const bar = document.getElementById("splitBar");
  if (!(r.g > 0)){ bar.style.display = "none"; return; }
  bar.style.display = "flex";
  const names = T.ddNames;
  const parts = {
    net:[Math.max(0, r.net), T.netL],
    lst:[r.lst, names.lst], church:[r.church, names.church],
    soli:[r.soli, T.rows.soli.l], kv:[r.kv, r.insurance === "public" ? names.kv : T.rows.pkv.l],
    rv:[r.rv, names.rv], av:[r.av, names.av], pv:[r.pv, names.pv]
  };
  for (const id in parts){
    const el = document.getElementById("sb-" + id);
    const v = parts[id][0];
    el.style.width = (v / r.g * 100) + "%";
    el.title = parts[id][1] + ": " + eur(v) + " €";
  }
}

function renderClassCompare(){

/* Krankenkassen-Vergleich: günstigste bundesweit geöffnete Kasse aus unserer Liste.
   hkk 2,59 % - Stand Jahreswechsel 2025/26, TODO: mit GKV-SV-Liste aktuell halten. */
const KK_CHEAPEST = { name:"hkk Krankenkasse", rate:2.59 };
function renderKk(r){
  setText("kkH",T.kkH); setText("kkLead",T.kkLead); setText("kkFine",T.kkFine);
  const el = document.getElementById("kkResult");
  if (state.insurance !== "public" || r.regime === "minijob" || r.regime === "werkstudent"){
    el.innerHTML = T.kkNa; return;
  }
  const diff = state.zusatzPct - KK_CHEAPEST.rate;
  if (diff < 0.05){ el.innerHTML = T.kkOk; return; }
  const kvB = Math.min(state.grossM, C.bbgKVmonth);
  const mo = kvB * (diff/100) / 2;   // AN-Anteil der Differenz
  el.innerHTML = T.kkSave(
    pct2(diff), fmt.format(mo), fmt0.format(Math.round(mo*12)),
    KK_CHEAPEST.name,
    lang==="de" ? KK_CHEAPEST.rate.toFixed(2).replace(".",",") : KK_CHEAPEST.rate.toFixed(2)
  );
}

function renderPkv(r){
  setText("pkvH",T.pkvH); setText("pkvLead",T.pkvLead);
  setText("pkvOfferL",T.pkvOfferL); setText("pkvFine",T.pkvFine);
  const st = document.getElementById("pkvStatus");
  const offerRow = document.getElementById("pkvOfferRow");
  offerRow.hidden = true;
  if (state.insurance === "private"){ st.innerHTML = T.pkvAlready; return; }
  if (r.regime === "minijob" || r.regime === "werkstudent"){ st.innerHTML = T.pkvNa; return; }
  if (state.grossM < C.jaegMonth){
    const gap = C.jaegMonth - state.grossM;
    st.innerHTML = T.pkvNotEligible(fmt0.format(C.jaegMonth*12), fmt0.format(Math.ceil(gap)));
    return;
  }
  // eligible: current GKV employee cost = KV + PV at their income
  const gkvCost = r.kv + r.pv;
  st.innerHTML = T.pkvEligible(fmt.format(gkvCost));
  offerRow.hidden = false;
  const prem = parseMoney(document.getElementById("pkvOffer").value);
  const resEl = document.getElementById("pkvResult");
  if (prem <= 0){ resEl.innerHTML = ""; return; }
  const agPv = LAENDER[state.landIdx][0] === "SN" ? 0.013 : 0.018;
  const employer = Math.min(prem/2, (C.pkvAgKvRate + agPv) * Math.min(state.grossM, C.bbgKVmonth));
  const own = Math.max(0, prem - employer);
  const diff = gkvCost - own;
  resEl.innerHTML = T.pkvCompare(fmt.format(own), fmt.format(Math.abs(diff)), diff > 0);
}

function renderBbgNote(r){
  const el = document.getElementById("bbgNote");
  if (r.aboveKV || r.aboveRV){
    el.classList.add("show");
    el.innerHTML = T.bbgNote(r.aboveRV);
  } else el.classList.remove("show");
}

function updateKasseNote(){
  const note = document.getElementById("kasseNote");
  const k = KASSEN[state.kasseIdx];
  if (k[1]===null) note.textContent = T.kasseNoteOther;
  else if (k[0]==="__avg") note.textContent = T.kasseNoteAvg;
  else note.textContent = T.kasseNoteNamed;
  if (RATES_STAND && k[1] !== null) note.textContent += " " + T.standLabel + " " + RATES_STAND + ".";
}

/* Live-Raten (optional): Liegt neben der HTML-Datei eine rates.json (per CI aus der
   amtlichen GKV-Liste erzeugt), ersetzt sie die eingebauten Kassenwerte. Schlägt der
   Abruf fehl (Artefakt, file://, offline), gelten die eingebauten Werte weiter. */
(async function loadRates(){
  /* Der Inhalt von rates.json wird wie nicht vertrauenswürdige Eingabe behandelt:
     Namen werden von HTML-Zeichen befreit und gekürzt, Zahlen auf plausible
     Bereiche geprüft. Alles außerhalb der Grenzen wird ignoriert. */
  const cleanName = s => String(s).replace(/[<>&"'`]/g, "").slice(0, 60);
  const num = (x, lo, hi) => { const n = Number(x); return Number.isFinite(n) && n >= lo && n <= hi ? n : null; };
  try{
    const res = await fetch("rates.json", {cache:"no-store"});
    if (!res.ok) return;
    const d = await res.json();
    if (!d || !Array.isArray(d.kassen) || !d.kassen.length) return;
    const kassen = d.kassen
      .map(k => [cleanName(k[0]), num(k[1], 0, 6)])
      .filter(k => k[0] && k[1] !== null);
    if (!kassen.length) return;
    const zusatz = num(d.zusatzDefault, 0, 6);
    KASSEN.length = 0;
    KASSEN.push(["__avg", zusatz !== null ? zusatz : C.zusatzDefault]);
    kassen.forEach(k => KASSEN.push(k));
    KASSEN.push(["__other", null]);
    if (zusatz !== null){
      C.zusatzDefault = zusatz;
      if (state.kasseIdx === 0) state.zusatzPct = zusatz;
    }
    if (d.kkCheapest){
      const r = num(d.kkCheapest.rate, 0, 6), n = cleanName(d.kkCheapest.name);
      if (n && r !== null){ KK_CHEAPEST.name = n; KK_CHEAPEST.rate = r; }
    }
    /* Jahreswerte (Verordnungslage) dürfen per rates.json nachgezogen werden,
       aber nur innerhalb enger Plausibilitätsgrenzen. */
    if (d.constants){
      const c = d.constants;
      const ml  = num(c.mindestlohn, 10, 25);
      const mj  = num(c.minijobGrenze, 400, 1200);
      if (ml !== null && mj !== null && mj === Math.ceil(ml * 130 / 3)){
        C.mindestlohn = ml; C.minijobGrenze = mj;
      }
      const jaeg = num(c.jaegMonth, 5000, 12000);
      if (jaeg !== null) C.jaegMonth = jaeg;
      const capKV = num(c.privEmployerCapKV, 300, 900);
      if (capKV !== null) C.privEmployerCapKV = capKV;
      const capPV = num(c.privEmployerCapPV, 50, 300);
      if (capPV !== null) C.privEmployerCapPV = capPV;
    }
    if (state.kasseIdx >= KASSEN.length) state.kasseIdx = 0;
    RATES_STAND = typeof d.stand === "string" ? d.stand.slice(0, 20).replace(/[<>&"'`]/g, "") : null;
    applyLang();
  }catch(e){ /* eingebaute Werte bleiben */ }
})();
</script>
