name: Verify calculation core
# Läuft bei jedem Push und wöchentlich. Schlägt fehl, sobald der Rechenkern
# von der amtlichen PAP-2026-Prüftabelle abweicht (z. B. nach einer Änderung
# an nettoklar.html oder wenn Konstanten versehentlich verstellt wurden).

on:
  push:
  pull_request:
  schedule:
    - cron: "17 5 * * 1"   # montags 05:17 UTC
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run PAP regression
        run: node tools/verify-pap.mjs nettoklar.html
