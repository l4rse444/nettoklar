name: Verify calculation core

on:
  push:
  pull_request:
  schedule:
    - cron: "17 5 * * 1"
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run PAP regression
        run: |
          FILE=index.html
          [ -f "$FILE" ] || FILE=nettoklar.html
          node tools/verify-pap.mjs "$FILE"
