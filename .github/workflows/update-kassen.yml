name: Update Kassen rates
# Holt wöchentlich die amtliche Krankenkassenliste des GKV-Spitzenverbands
# (Pflichtveröffentlichung nach §242 Abs. 5 SGB V), erzeugt rates.json neu
# und öffnet bei Änderungen einen Pull Request. KEIN automatischer Merge:
# ein Mensch prüft den Diff, dann erst geht die Änderung live.
#
# Hinweis: Der PDF-Parser ist bewusst defensiv. Ändert der GKV-Spitzenverband
# das Layout, schlägt der Job fehl statt stillschweigend falsche Werte zu
# schreiben. Alternative maschinenlesbare Quelle: ITSG-Beitragssatzdatei
# (https-Download mit RSS-Feed), falls das PDF-Parsing zu fragil wird.

on:
  schedule:
    - cron: "43 6 * * 1"   # montags 06:43 UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check preconditions
        run: |
          if [ ! -f rates.json ]; then
            echo "::error::rates.json fehlt im Repo-Root. Bitte die rates.json aus den Projekt-Deliverables per PR hochladen; sie ist die Basis, deren Saetze dieser Bot aktualisiert."
            exit 1
          fi
          python3 -c "import json; json.load(open('rates.json'))" || { echo "::error::rates.json ist kein gueltiges JSON."; exit 1; }

      - name: Fetch official list
        run: |
          curl -fsSL --retry 3 --retry-delay 5 \
               -A "lohnlupe-rates-bot (github.com; woechentlicher Abgleich der Pflichtveroeffentlichung nach Par. 242 Abs. 5 SGB V)" \
               -o kassenliste.pdf "https://www.gkv-spitzenverband.de/krankenkassenliste.pdf" \
               || { echo "::error::Download der amtlichen Liste fehlgeschlagen (URL geaendert oder Server blockt). Alternative Quelle: ITSG-Beitragssatzdatei."; exit 1; }
          sudo apt-get update -qq && sudo apt-get install -y -qq poppler-utils
          pdftotext -layout kassenliste.pdf kassenliste.txt
          echo "--- Kopf der extrahierten Liste (Diagnose) ---"
          head -n 15 kassenliste.txt

      - name: Build rates.json
        run: |
          python3 - <<'EOF'
          import json, re, sys, datetime

          txt = open("kassenliste.txt", encoding="utf-8").read()

          # Nur die Kassen aktualisieren, die nettoklar anzeigt: die bestehende
          # Liste in rates.json ist die Auswahl; hier werden nur die Sätze erneuert.
          current = json.load(open("rates.json", encoding="utf-8"))

          # Spaltenweises Lesen statt Zeilenende-Anker: pdftotext -layout trennt
          # Spalten durch 2+ Leerzeichen. Name = erste Spalte; Satz = erste
          # Spalte, die wie eine Dezimalzahl 0-6 aussieht (mit oder ohne %).
          # Immun gegen weitere Spalten dahinter (z. B. Bundesland-Oeffnungen).
          rates = {}
          for line in txt.splitlines():
              cols = [c.strip() for c in re.split(r"\s{2,}", line.strip()) if c.strip()]
              if len(cols) < 2:
                  continue
              name = cols[0]
              if re.match(r"\d", name) or name.lower().startswith(("krankenkassenname", "seite", "stand")):
                  continue
              for c in cols[1:]:
                  m = re.fullmatch(r"(\d{1,2},\d{1,2})\s*%?", c)
                  if m:
                      v = float(m.group(1).replace(",", "."))
                      if 0 <= v <= 6:
                          rates[name] = v
                      break
          if len(rates) < 50:
              print("Parser fand nur %d Kassen; Layout vermutlich geaendert." % len(rates))
              print("--- Beispielzeilen fuer die Diagnose ---")
              for l in [l for l in txt.splitlines() if l.strip()][:25]:
                  print(repr(l))
              sys.exit(1)

          def find(name):
              key = name.split("(")[0].strip().lower()
              for k, v in rates.items():
                  if key in k.lower() or k.lower() in key:
                      return v
              return None

          changed = False
          for entry in current["kassen"]:
              v = find(entry[0])
              if v is not None and abs(v - entry[1]) > 0.001:
                  entry[1] = v
                  changed = True

          cheapest = min(current["kassen"], key=lambda e: e[1])
          current["kkCheapest"] = {"name": cheapest[0], "rate": cheapest[1]}
          current["stand"] = datetime.date.today().isoformat()

          json.dump(current, open("rates.json", "w", encoding="utf-8"),
                    ensure_ascii=False, indent=2)
          print("changed:", changed)
          EOF

      - name: Open pull request on change
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "rates: Kassenliste aktualisiert (GKV-Spitzenverband)"
          title: "Kassenliste aktualisiert"
          body: |
            Automatischer Abgleich mit der amtlichen Krankenkassenliste des
            GKV-Spitzenverbands (§242 Abs. 5 SGB V). Bitte Diff prüfen und mergen.
          branch: bot/update-kassen
          add-paths: rates.json
